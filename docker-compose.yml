version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    environment:
      - DATA_DIR=/data
    restart: unless-stopped

  # Dev only: run frontend separately with hot reload
  # In production, run `docker-compose up --build` — the Dockerfile builds the frontend automatically
